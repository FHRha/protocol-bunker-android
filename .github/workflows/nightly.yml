name: nightly

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server-go/go.mod

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK/NDK Packages
        shell: bash
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.2.12479018"

      - name: Run Smoke Release Script
        shell: bash
        run: bash ./scripts/smoke-release.sh

  android-e2e-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server-go/go.mod

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Client Dist (source-only repo mode)
        shell: bash
        run: |
          npm --prefix shared ci --no-audit --no-fund
          npm --prefix shared run build
          npm --prefix client ci --no-audit --no-fund
          npm --prefix client run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK/NDK + Emulator Image
        shell: bash
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.2.12479018" \
            "emulator" \
            "system-images;android-35;google_apis;x86_64"

      - name: Build Go Android ABI Binaries
        shell: bash
        run: bash ./server-go/scripts/build-android-binaries.sh

      - name: Run Android Emulator E2E
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: pixel_7
          disable-animations: true
          emulator-options: -no-snapshot-save -no-boot-anim -gpu swiftshader_indirect
          script: |
            set -euo pipefail
            cd android-app
            chmod +x ./gradlew
            mkdir -p ../artifacts/e2e
            collect_debug_artifacts() {
              adb devices || true
              adb logcat -d > ../artifacts/e2e/logcat.txt || true
              adb bugreport ../artifacts/e2e/bugreport || true
              adb exec-out screencap -p > ../artifacts/e2e/screenshot.png || true
            }
            trap 'collect_debug_artifacts' ERR

            ./gradlew --no-daemon :app:connectedX8664DebugAndroidTest \
              "-Pandroid.testInstrumentationRunnerArguments.class=com.protocolbunker.host.ServerHostInstrumentedTest#websocketHostFlow_canCreateRoomAndStartGame"
            ./gradlew --no-daemon :app:connectedX8664DebugAndroidTest \
              "-Pandroid.testInstrumentationRunnerArguments.class=com.protocolbunker.host.ServerHostInstrumentedTest#websocketHostFlow_canTransferHostRole"
            ./gradlew --no-daemon :app:connectedX8664DebugAndroidTest \
              "-Pandroid.testInstrumentationRunnerArguments.class=com.protocolbunker.host.ServerHostInstrumentedTest#websocketHostFlow_controlCompanionDoesNotCreatePlayer"

      - name: Upload Android E2E Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-nightly-debug
          path: |
            artifacts/e2e/**
            android-app/app/build/reports/androidTests/**
            android-app/app/build/outputs/androidTest-results/**
          if-no-files-found: ignore
