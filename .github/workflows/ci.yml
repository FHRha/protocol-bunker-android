name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  encoding-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate UTF-8 Encoding (strict)
        shell: bash
        run: pwsh -File ./scripts/check-encoding.ps1

  server-go-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server-go/go.mod

      - name: Run Full Go Test Suite
        shell: bash
        run: |
          cd server-go
          go test ./...

  server-ws-integration:
    needs: server-go-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server-go/go.mod

      - name: Run Fast WS Integration Test
        shell: bash
        run: |
          cd server-go
          go test -run TestServer_Edge_WSFastPath_HelloTransferHostStartGame -count=1 .
